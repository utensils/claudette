name: Conventional Commits

on:
  pull_request:
    types:
      - edited
      - opened
      - reopened
      - synchronize

jobs:
  title:
    name: PR title
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read

    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          subjectPattern: ^.+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title is not valid.
            Please use a conventional commit format, such as "type: description" or "type(scope): description" (scope is optional).

  commits:
    name: Commit messages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml
