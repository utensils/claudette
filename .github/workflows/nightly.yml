name: Nightly Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "**/*.md"
      - ".github/workflows/deploy-site.yml"
      - ".github/workflows/conventional-commits.yml"
      - ".github/workflows/update-frontend-hash.yml"
      - ".github/workflows/release-please.yml"
      - ".release-please-manifest.json"
      - "CHANGELOG.md"
  workflow_dispatch: {}

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  compute-version:
    name: Compute Version
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      short_sha: ${{ steps.v.outputs.short_sha }}
      last_tag: ${{ steps.v.outputs.last_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: v
        run: |
          set -euo pipefail
          CURRENT=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          IFS='.' read -r MAJ MIN _ <<< "$CURRENT"
          NEXT_MINOR="${MAJ}.$((MIN + 1)).0"

          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --count "${LAST_TAG}..HEAD")
          else
            COMMITS=$(git rev-list --count HEAD)
          fi

          SHORT=$(git rev-parse --short=7 HEAD)
          VERSION="${NEXT_MINOR}-dev.${COMMITS}.g${SHORT}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed nightly version: ${VERSION}"

  prepare-release:
    name: Prepare Release
    needs: compute-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Build into a separate `nightly-staging` release so the live `nightly`
      # release (with the previous build's assets) stays accessible to the
      # in-app updater for the entire duration of the build. The `publish`
      # job atomically promotes staging → nightly once all matrix jobs
      # succeed, shrinking the unavailability window from "the entire build"
      # to a couple of seconds.
      - name: Reset staging release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.compute-version.outputs.version }}
          LAST_TAG: ${{ needs.compute-version.outputs.last_tag }}
        run: |
          gh release delete nightly-staging --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          NOTES="Automated nightly build of \`${GITHUB_SHA}\`.

          **Version:** \`${VERSION}\`
          **Built:** $(date -u +%FT%TZ)"

          if [ -n "$LAST_TAG" ]; then
            DIFF_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${LAST_TAG}...${GITHUB_SHA}"
            NOTES="${NOTES}
          [Changes since ${LAST_TAG}](${DIFF_URL})"
          fi

          NOTES="${NOTES}

          > **These builds are unstable pre-releases.**"

          gh release create nightly-staging \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Nightly ${VERSION}" \
            --notes "$NOTES" \
            --prerelease \
            --draft

  build:
    needs: [compute-version, prepare-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: app,dmg
            label: macos-aarch64
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            bundles: app,dmg
            label: macos-x86_64
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-x86_64
          # GitHub-hosted aarch64 Linux runner (`ubuntu-22.04-arm`) is GA and
          # native, so this is a real ARM64 build — no QEMU / cross toolchain.
          - platform: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-aarch64
          # Windows keeps the user-facing zip asset and also publishes a
          # signed NSIS updater asset so `latest.json` can advertise an
          # in-app update target for Windows.
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: ""
            label: windows-x86_64
          - platform: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            bundles: ""
            label: windows-aarch64

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stamp nightly version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ needs.compute-version.outputs.version }}
        run: |
          perl -i -pe 's/^version\s*=\s*"[^"]+"/version = "$ENV{NIGHTLY_VERSION}"/' Cargo.toml
          perl -i -pe 's/^version\s*=\s*"[^"]+"/version = "$ENV{NIGHTLY_VERSION}"/' src-tauri/Cargo.toml
          perl -i -pe 's/^version\s*=\s*"[^"]+"/version = "$ENV{NIGHTLY_VERSION}"/' src-server/Cargo.toml
          perl -i -pe 's/^version\s*=\s*"[^"]+"/version = "$ENV{NIGHTLY_VERSION}"/' src-cli/Cargo.toml
          grep '^version' Cargo.toml src-tauri/Cargo.toml src-server/Cargo.toml src-cli/Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.label }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install frontend dependencies
        shell: bash
        run: cd src/ui && bun install --frozen-lockfile

      - name: Generate icons
        shell: bash
        run: npx @tauri-apps/cli icon assets/logo.png

      # Build the `claudette` CLI for the current matrix target and stage
      # it where `bundle.externalBin` expects (`src-tauri/binaries/
      # claudette-<TARGET_TRIPLE>`). Tauri's bundler picks it up and
      # places it next to the GUI binary in the resulting artifact:
      # `Claudette.app/Contents/MacOS/claudette` on macOS, `/usr/bin/
      # claudette` in the .deb (auto-on-PATH for apt installs), and
      # alongside `claudette-app` for AppImage / Windows zip.
      - name: Build and stage CLI sidecar
        shell: bash
        run: scripts/stage-cli-sidecar.sh ${{ matrix.rust-target }}

      # ---- macOS + Linux: tauri-action drives the bundled build ------------
      # `includeUpdaterJson: false` is intentional. tauri-action's default
      # behavior is to download the release's existing `latest.json`, merge
      # this leg's platform entry in, and re-upload — which races on the
      # GitHub Releases API across parallel matrix legs. Concrete failures
      # observed on run #25543925342:
      #   * linux-x86_64 lost the merge-upload race outright with
      #     `Validation Failed: ReleaseAsset already_exists` (non-recoverable
      #     within the action), failing the whole job.
      #   * darwin-aarch64 succeeded as a job but its manifest entry was
      #     silently overwritten when macos-x86_64's parallel merge clobbered
      #     it on upload, so the published manifest would have advertised no
      #     update path for Apple Silicon Macs.
      # The `publish` job below now constructs `latest.json` once from each
      # platform's `.sig` files (which are uploaded by tauri-action with
      # unique names, no race), eliminating the conflict surface entirely.
      # The bundle step is duplicated up to 3x to absorb transient
      # Apple-notarization flakes. Run #25608625502 (macos-aarch64) failed
      # at the very last hop with `NSURLErrorDomain Code=-1009
      # "The Internet connection appears to be offline"` while polling
      # https://appstoreconnect.apple.com/notary/v2/submissions/<uuid>?
      # — even though `NSURLErrorNWPathKey=satisfied` reported the
      # runner network as fine. That's a transient hiccup against
      # Apple's notary service, not a code or config problem, so we
      # retry the whole bundle. tauri-action is a JS action and can't
      # be wrapped by `nick-fields/retry`; duplicated steps with
      # `continue-on-error` + `outcome` checks is the native pattern.
      #
      # Retries are macOS-only because that's the documented failure
      # mode. Linux failures here (rare) are usually `gh release
      # upload` 422 conflicts, which retrying does not fix.
      #
      # Compile artifacts survive between attempts, so retries skip
      # straight to bundle → codesign → notarize → upload (~1–2 min
      # each). If the first attempt got past notarization and started
      # uploading, a retry could trip on duplicate assets — accepted
      # cost; the common flake is pre-upload.
      - name: Build and upload desktop app (non-Windows) — attempt 1
        id: bundle1
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        continue-on-error: ${{ runner.os == 'macOS' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: nightly-staging
          releaseName: "Nightly ${{ needs.compute-version.outputs.version }}"
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      - name: Build and upload desktop app (non-Windows) — attempt 2 (macOS retry)
        id: bundle2
        if: ${{ runner.os == 'macOS' && steps.bundle1.outcome == 'failure' }}
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: nightly-staging
          releaseName: "Nightly ${{ needs.compute-version.outputs.version }}"
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      - name: Build and upload desktop app (non-Windows) — attempt 3 (macOS final)
        if: ${{ runner.os == 'macOS' && steps.bundle1.outcome == 'failure' && steps.bundle2.outcome == 'failure' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: nightly-staging
          releaseName: "Nightly ${{ needs.compute-version.outputs.version }}"
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      # ---- Windows: direct Tauri build, ship zip + NSIS updater ------------
      # `custom-protocol` is the feature flag that tells tauri-build to
      # embed `frontendDist` (otherwise the release binary tries to
      # contact the devUrl at startup and shows "localhost refused to
      # connect"). `alternative-backends` is kept in release binaries
      # while the user-facing experimental setting remains off by default.
      - name: Install Tauri CLI (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop exe and updater installer (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build \
            --target ${{ matrix.rust-target }} \
            --bundles nsis \
            --features tauri/custom-protocol,alternative-backends

      # Zip the bare .exe before upload. Raw unsigned .exe downloads
      # trigger aggressive SmartScreen + browser warnings ("file not
      # commonly downloaded / could harm your device"); shipping inside
      # a .zip is the customary Windows distribution shape and keeps
      # Mark-of-the-Web attached to the archive rather than the binary.
      # `Compress-Archive` is a built-in PowerShell cmdlet on every
      # Windows runner — no external deps.
      - name: Upload desktop exe (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-app.exe"
          # Bundle the CLI sidecar alongside the GUI exe so the
          # Settings → CLI "Install on PATH" action can find it via
          # `current_exe().parent()/"claudette.exe"`. The Windows path
          # skips tauri-action so externalBin doesn't auto-stage here.
          CLI="src-tauri/binaries/claudette-${{ matrix.rust-target }}.exe"
          ASSET="claudette-${{ matrix.label }}.zip"
          cp "$BIN" claudette-app.exe
          cp "$CLI" claudette.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette-app.exe','claudette.exe' -DestinationPath '$ASSET' -Force"
          gh release upload nightly-staging "$ASSET" --clobber

      - name: Upload updater installer (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          NSIS_DIR="target/${{ matrix.rust-target }}/release/bundle/nsis"
          INSTALLER="$(find "$NSIS_DIR" -maxdepth 1 -name '*setup.exe' -print -quit)"
          if [ -z "$INSTALLER" ]; then
            echo "::error::No NSIS updater installer found in $NSIS_DIR"
            exit 1
          fi
          SIG="${INSTALLER}.sig"
          if [ ! -f "$SIG" ]; then
            cargo tauri signer sign \
              -k "$TAURI_SIGNING_PRIVATE_KEY" \
              -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "$INSTALLER" > "$SIG"
          fi
          gh release upload nightly-staging "$INSTALLER" "$SIG" --clobber

      - name: Build headless server
        shell: bash
        run: cargo build --release -p claudette-server --target ${{ matrix.rust-target }}

      - name: Upload headless server binary (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server"
          ASSET="claudette-server-${{ matrix.label }}"
          cp "$BIN" "$ASSET"
          gh release upload nightly-staging "$ASSET" --clobber

      - name: Upload headless server binary (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server.exe"
          ASSET="claudette-server-${{ matrix.label }}.zip"
          cp "$BIN" claudette-server.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette-server.exe' -DestinationPath '$ASSET' -Force"
          gh release upload nightly-staging "$ASSET" --clobber

      # Also publish the CLI as a standalone release asset for users who
      # want it without installing the full desktop app (CI bots, headless
      # servers, etc.). The same binary already ships inside the app
      # artifacts above; this is just an extra distribution channel.
      - name: Upload standalone CLI (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette"
          ASSET="claudette-cli-${{ matrix.label }}"
          cp "$BIN" "$ASSET"
          gh release upload nightly-staging "$ASSET" --clobber

      - name: Upload standalone CLI (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette.exe"
          ASSET="claudette-cli-${{ matrix.label }}.zip"
          cp "$BIN" claudette.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette.exe' -DestinationPath '$ASSET' -Force"
          gh release upload nightly-staging "$ASSET" --clobber

  # Nightly builds are not announced to Discord — too noisy. Stable releases only.
  publish:
    name: Publish Nightly
    needs: [compute-version, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      # We need the repo checked out to run scripts/build-updater-manifest.sh.
      # Everything else this job does runs against the GitHub Releases API,
      # so a default shallow checkout is sufficient.
      - name: Checkout
        uses: actions/checkout@v6

      # Atomic-ish promote: verify the staging release is intact, delete the
      # live `nightly` release+tag, then retag `nightly-staging` to
      # `nightly` and un-draft. The blackout window between the delete and
      # the retag is ~1–2s — orders of magnitude smaller than the prior
      # delete-then-rebuild flow, and covered on the client side by treating
      # "release manifest not found" as "no update".
      - name: Promote staging to nightly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.compute-version.outputs.version }}
        run: |
          set -euo pipefail

          # Pre-flight: ensure `nightly-staging` is reachable before we touch
          # `nightly`. If staging is somehow missing or the API is down, we
          # want to abort *with `nightly` still intact* rather than leave the
          # repository with no nightly release at all.
          if ! gh release view nightly-staging --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::nightly-staging release is not reachable; aborting promotion"
            exit 1
          fi

          # Build `latest.json` from the per-platform `.sig` files uploaded
          # by tauri-action. Each matrix leg uploaded its own signed
          # updater bundle plus its `.sig` companion under unique asset
          # names (no collision), but the legs no longer write
          # `latest.json` themselves (`includeUpdaterJson: false` in the
          # build step) — so we synthesize the manifest here, in a single
          # writer with no race surface. URLs are emitted directly with
          # the `nightly` tag (the tag they will live at after the retag
          # below), so no after-the-fact URL rewriting is needed. The
          # Tauri signature covers binary content, not the URL field, so
          # this URL choice does not affect verification.
          #
          # Build the manifest *before* the retag, while staging still
          # exists, then upload it back to staging. Assets follow the
          # release through the retag, so when the retag below succeeds
          # the new manifest appears at the `nightly/...` URL atomically.
          mkdir -p staging-sigs
          for attempt in 1 2 3; do
            rm -f staging-sigs/*.sig
            if gh release download nightly-staging \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "*.sig" \
              --dir staging-sigs \
              --clobber; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to fetch nightly-staging .sig files after 3 attempts"
              exit 1
            fi
            backoff=$((attempt * 5))
            echo ".sig fetch attempt $attempt failed; retrying in ${backoff}s"
            sleep "$backoff"
          done

          scripts/build-updater-manifest.sh \
            staging-sigs \
            "$VERSION" \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly" \
            > latest.json

          # Belt-and-braces: catch any regression in the script that could
          # ship a manifest with staging URLs (which would 404 after the
          # retag and break the updater).
          if grep -q 'releases/download/nightly-staging/' latest.json; then
            echo "::error::latest.json contains nightly-staging URLs; aborting"
            exit 1
          fi

          # Upload the synthesized manifest to `nightly-staging` *before*
          # we touch `nightly`. Assets follow the release when its tag
          # changes, so when the retag below succeeds the manifest
          # appears at the `nightly/...` URL atomically — no separate
          # post-retag upload that could fail and leave a broken manifest
          # live on the promoted release.
          for attempt in 1 2 3; do
            if gh release upload nightly-staging latest.json --clobber --repo "$GITHUB_REPOSITORY"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to upload latest.json to nightly-staging after 3 attempts"
              exit 1
            fi
            backoff=$((attempt * 5))
            echo "latest.json upload attempt $attempt failed; retrying in ${backoff}s"
            sleep "$backoff"
          done

          gh release delete nightly --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          # Promotion runs in three explicitly-verified stages because
          # combining the tag rename and the draft flip in a single
          # `gh release edit nightly-staging --tag nightly --draft=false
          # --prerelease` call has intermittently landed only the rename
          # server-side while the release stayed draft=true. The CLI
          # prints the new release URL and exits 0 either way, so the
          # workflow can't tell from the exit status alone. A draft
          # release returns 404 on anonymous downloads, so the updater
          # can't fetch `latest.json` and users silently miss the
          # update. See: this PR's commit message + manual recovery of
          # `0.24.0-dev.105.g68df742` on 2026-05-11.
          #
          # Stage 1: retag `nightly-staging` → `nightly` and mark
          # prerelease. Independent retry loop.
          for attempt in 1 2 3; do
            if gh release edit nightly-staging \
              --repo "$GITHUB_REPOSITORY" \
              --tag nightly \
              --prerelease; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to retag nightly-staging→nightly after 3 attempts"
              exit 1
            fi
            echo "Retag attempt $attempt failed; retrying in 5s"
            sleep 5
          done

          # Stage 2: un-draft the (now-renamed) release as a separate
          # PATCH so the API can't drop the flip on the floor. Verify
          # the post-state via `gh api releases/tags/nightly` rather
          # than trusting `gh release edit`'s exit code — it has been
          # observed to print the release URL and return 0 while
          # `draft` stayed `true`.
          for attempt in 1 2 3; do
            gh release edit nightly --repo "$GITHUB_REPOSITORY" --draft=false || true
            draft_state=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" \
              --jq '.draft' 2>/dev/null || echo "unknown")
            if [ "$draft_state" = "false" ]; then
              echo "nightly release is now draft=false"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              # `unknown` here means the post-state query itself failed;
              # "still draft" would be misleading in that case. Phrase
              # the error so it differentiates the two without forcing
              # the reader to remember the special sentinel.
              echo "::error::nightly release is still not draft=false after 3 attempts (current state: $draft_state — \"unknown\" means the gh api query failed)"
              exit 1
            fi
            echo "Un-draft attempt $attempt left draft=$draft_state; retrying in 5s"
            sleep 5
          done

          # Stage 3: anonymous-fetch smoke. This is the actual contract
          # the in-app updater relies on — a 200 here proves the release
          # is reachable by clients that don't carry a GitHub auth
          # token. A short CDN propagation lag after the un-draft is
          # normal; retry a few times before failing.
          MANIFEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly/latest.json"
          for attempt in 1 2 3 4 5; do
            # `set -e` is active for this step; `var=$(failing-cmd)`
            # exits the script on transient curl failures (DNS, TLS,
            # timeout) before the retry loop can even consider them.
            # `|| echo "000"` makes the substitution always exit 0 and
            # surfaces a non-2xx-shaped value to the next branch, which
            # then drives the retry. Same pattern as stage 2's gh api
            # fallback to "unknown".
            http=$(curl -sIL -o /dev/null -w "%{http_code}" "$MANIFEST_URL" || echo "000")
            if [ "$http" = "200" ]; then
              echo "latest.json reachable at $MANIFEST_URL (HTTP 200)"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::latest.json at $MANIFEST_URL returned HTTP $http after promotion"
              exit 1
            fi
            echo "latest.json HTTP $http (attempt $attempt); retrying in 10s"
            sleep 10
          done

          # `gh release edit --tag` creates the new tag (`nightly`) at the
          # release's target commit but leaves the old `nightly-staging`
          # git tag orphaned. Clean it up so we don't accumulate dead tags.
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly-staging" 2>/dev/null || true
