name: Nightly Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "**/*.md"
      - ".github/workflows/deploy-site.yml"
      - ".github/workflows/conventional-commits.yml"
      - ".github/workflows/update-frontend-hash.yml"
      - ".github/workflows/release-please.yml"
      - ".release-please-manifest.json"
      - "CHANGELOG.md"
  workflow_dispatch: {}

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  compute-version:
    name: Compute Version
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      short_sha: ${{ steps.v.outputs.short_sha }}
      last_tag: ${{ steps.v.outputs.last_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: v
        run: |
          set -euo pipefail
          CURRENT=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          IFS='.' read -r MAJ MIN _ <<< "$CURRENT"
          NEXT_MINOR="${MAJ}.$((MIN + 1)).0"

          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --count "${LAST_TAG}..HEAD")
          else
            COMMITS=$(git rev-list --count HEAD)
          fi

          SHORT=$(git rev-parse --short=7 HEAD)
          VERSION="${NEXT_MINOR}-dev.${COMMITS}.g${SHORT}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed nightly version: ${VERSION}"

  prepare-release:
    name: Prepare Release
    needs: compute-version
    runs-on: ubuntu-latest
    outputs:
      staging_tag: ${{ steps.staging.outputs.tag }}
      staging_release_id: ${{ steps.staging.outputs.release_id }}
    steps:
      - uses: actions/checkout@v6

      # Build into a unique staging release so the live `nightly` release
      # stays accessible to the in-app updater for the entire build. The
      # publish job copies validated assets into `nightly` instead of
      # retagging/deleting the live release.
      - name: Reset staging release
        id: staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.compute-version.outputs.version }}
          LAST_TAG: ${{ needs.compute-version.outputs.last_tag }}
        run: |
          set -euo pipefail

          STAGING_TAG="nightly-staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gh release delete "$STAGING_TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          NOTES="Automated nightly build of \`${GITHUB_SHA}\`.

          **Version:** \`${VERSION}\`
          **Built:** $(date -u +%FT%TZ)"

          if [ -n "$LAST_TAG" ]; then
            DIFF_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${LAST_TAG}...${GITHUB_SHA}"
            NOTES="${NOTES}
          [Changes since ${LAST_TAG}](${DIFF_URL})"
          fi

          NOTES="${NOTES}

          > **These builds are unstable pre-releases.**"

          RELEASE_ID=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$STAGING_TAG" \
            -f target_commitish="$GITHUB_SHA" \
            -f name="Nightly ${VERSION}" \
            -f body="$NOTES" \
            -F draft=true \
            -F prerelease=true \
            --jq .id)
          echo "tag=${STAGING_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  build:
    needs: [compute-version, prepare-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: app
            label: macos-aarch64
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            bundles: app
            label: macos-x86_64
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-x86_64
          # GitHub-hosted aarch64 Linux runner (`ubuntu-22.04-arm`) is GA and
          # native, so this is a real ARM64 build — no QEMU / cross toolchain.
          - platform: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-aarch64
          # Windows ships bare `.exe` assets only (no MSI/NSIS bundle).
          # The tauri-action step is skipped on Windows and we drive
          # cargo directly against the native MSVC toolchain baked into
          # GitHub's Windows runners. `windows-11-arm` is GA and native,
          # so ARM64 builds aren't cross-compiled.
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: ""
            label: windows-x86_64
          - platform: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            bundles: ""
            label: windows-aarch64

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stamp nightly version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ needs.compute-version.outputs.version }}
        run: |
          perl -i -pe 's/^version\s*=\s*"[^"]+"/version = "$ENV{NIGHTLY_VERSION}"/' Cargo.toml
          perl -i -pe 's/^version\s*=\s*"[^"]+"/version = "$ENV{NIGHTLY_VERSION}"/' src-tauri/Cargo.toml
          perl -i -pe 's/^version\s*=\s*"[^"]+"/version = "$ENV{NIGHTLY_VERSION}"/' src-server/Cargo.toml
          grep '^version' Cargo.toml src-tauri/Cargo.toml src-server/Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.label }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install frontend dependencies
        shell: bash
        run: cd src/ui && bun install --frozen-lockfile

      - name: Generate icons
        shell: bash
        run: npx @tauri-apps/cli icon assets/logo.png

      # ---- macOS + Linux: tauri-action drives the bundled build ------------
      - name: Build and upload desktop app (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ needs.prepare-release.outputs.staging_tag }}
          releaseId: ${{ needs.prepare-release.outputs.staging_release_id }}
          releaseName: "Nightly ${{ needs.compute-version.outputs.version }}"
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      # DMGs are useful manual downloads, but they are not part of the
      # updater contract. Build and upload them after the app tarball/manifest
      # so a DMG packaging failure cannot strand the update feed again.
      - name: Build and upload macOS DMG (best effort)
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          STAGING_TAG: ${{ needs.prepare-release.outputs.staging_tag }}
        run: |
          set -euo pipefail
          npx @tauri-apps/cli@v2 build --target ${{ matrix.rust-target }} --bundles dmg

          shopt -s nullglob
          dmgs=(target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "::warning::No DMG was produced for ${{ matrix.label }}"
            exit 0
          fi

          gh release upload "$STAGING_TAG" "${dmgs[@]}" --repo "$GITHUB_REPOSITORY" --clobber

      # ---- Windows: direct cargo build, ship the bare .exe -----------------
      # `custom-protocol` is the feature flag that tells tauri-build to
      # embed `frontendDist` (otherwise the release binary tries to
      # contact the devUrl at startup and shows "localhost refused to
      # connect"). `tauri-action` sets this automatically via
      # `cargo tauri build`; since we're bypassing it on Windows, we
      # pass the flag explicitly.
      - name: Build desktop exe (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: |
          cd src/ui && bun run build && cd ../..
          cargo build --release -p claudette-tauri \
            --features tauri/custom-protocol \
            --target ${{ matrix.rust-target }}

      # Zip the bare .exe before upload. Raw unsigned .exe downloads
      # trigger aggressive SmartScreen + browser warnings ("file not
      # commonly downloaded / could harm your device"); shipping inside
      # a .zip is the customary Windows distribution shape and keeps
      # Mark-of-the-Web attached to the archive rather than the binary.
      # `Compress-Archive` is a built-in PowerShell cmdlet on every
      # Windows runner — no external deps.
      - name: Upload desktop exe (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette.exe"
          ASSET="claudette-${{ matrix.label }}.zip"
          cp "$BIN" claudette.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette.exe' -DestinationPath '$ASSET' -Force"
          gh release upload "${{ needs.prepare-release.outputs.staging_tag }}" "$ASSET" --clobber

      - name: Build headless server
        shell: bash
        run: cargo build --release -p claudette-server --target ${{ matrix.rust-target }}

      - name: Upload headless server binary (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server"
          ASSET="claudette-server-${{ matrix.label }}"
          cp "$BIN" "$ASSET"
          gh release upload "${{ needs.prepare-release.outputs.staging_tag }}" "$ASSET" --clobber

      - name: Upload headless server binary (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server.exe"
          ASSET="claudette-server-${{ matrix.label }}.zip"
          cp "$BIN" claudette-server.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette-server.exe' -DestinationPath '$ASSET' -Force"
          gh release upload "${{ needs.prepare-release.outputs.staging_tag }}" "$ASSET" --clobber

  # Nightly builds are not announced to Discord — too noisy. Stable releases only.
  publish:
    name: Publish Nightly
    needs: [compute-version, prepare-release, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Promote staging to nightly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.compute-version.outputs.version }}
          LAST_TAG: ${{ needs.compute-version.outputs.last_tag }}
          STAGING_TAG: ${{ needs.prepare-release.outputs.staging_tag }}
        run: |
          set -euo pipefail

          cleanup_staging() {
            gh release delete "$STAGING_TAG" --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${STAGING_TAG}" 2>/dev/null || true
          }
          trap cleanup_staging EXIT

          if ! gh release view "$STAGING_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::${STAGING_TAG} release is not reachable; aborting promotion"
            exit 1
          fi

          NOTES="Automated nightly build of \`${GITHUB_SHA}\`.

          **Version:** \`${VERSION}\`
          **Built:** $(date -u +%FT%TZ)"

          if [ -n "$LAST_TAG" ]; then
            DIFF_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${LAST_TAG}...${GITHUB_SHA}"
            NOTES="${NOTES}
          [Changes since ${LAST_TAG}](${DIFF_URL})"
          fi

          NOTES="${NOTES}

          > **These builds are unstable pre-releases.**"

          if ! gh release view nightly --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create nightly \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Nightly ${VERSION}" \
              --notes "$NOTES" \
              --prerelease \
              --draft
          fi

          .github/scripts/promote-release-assets.sh "$GITHUB_REPOSITORY" "$STAGING_TAG" nightly

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/nightly" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly" \
              -f sha="$GITHUB_SHA" \
              -F force=true >/dev/null
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/nightly" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi

          gh release edit nightly \
            --repo "$GITHUB_REPOSITORY" \
            --title "Nightly ${VERSION}" \
            --notes "$NOTES" \
            --prerelease \
            --draft=false

          .github/scripts/validate-public-latest.sh "$GITHUB_REPOSITORY" nightly
