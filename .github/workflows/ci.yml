name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  migration-guard:
    name: Migration guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject edits to released migrations
        run: |
          modified="$(
            git diff --diff-filter=M --name-only "origin/${{ github.base_ref }}...HEAD" -- 'src/migrations/*.sql'
          )"

          if [ -n "$modified" ]; then
            echo "::error title=Released migration edited::Do not edit released migration SQL files. Add a new forward migration instead. See CLAUDE.md Schema migrations."
            echo "Modified migration files:" >&2
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              echo "::error file=$file::Released migrations are immutable; add a new migration instead."
              echo "  - $file" >&2
            done <<< "$modified"
            exit 1
          fi

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p claudette -p claudette-server --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with coverage
        run: cargo llvm-cov -p claudette -p claudette-server --all-features --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: utensils/claudette
          files: lcov.info
          fail_ci_if_error: false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run lint:css
      - run: bun run build
      - run: bun run test

  # Note: Windows is not built in this CI pipeline. Windows artifacts
  # are produced by the nightly (`.github/workflows/nightly.yml`) and
  # release (`.github/workflows/release-please.yml`) workflows, which
  # cover both `x86_64-pc-windows-msvc` and `aarch64-pc-windows-msvc`.
  # Skipping Windows here keeps PR turnaround fast — Windows runners
  # take ~10 min — without losing build-verification coverage where
  # it matters (artifact production).
