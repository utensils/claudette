name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  migration-guard:
    name: Migration guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject edits to released migrations
        run: |
          changed="$(
            git diff --find-renames --diff-filter=MDR --name-status "origin/${{ github.base_ref }}...HEAD" -- 'src/migrations/*.sql'
          )"

          if [ -n "$changed" ]; then
            echo "::error title=Released migration changed::Released migration files are immutable; do not edit, rename, or delete them. Add a new forward migration instead. See CLAUDE.md Schema migrations."
            echo "Changed released migration files:" >&2
            while IFS=$'\t' read -r status path rest; do
              [ -n "$status" ] || continue
              echo "::error file=$path::Released migration files are immutable; do not edit, rename, or delete them."
              if [ -n "$rest" ]; then
                echo "  - $status $path -> $rest" >&2
              else
                echo "  - $status $path" >&2
              fi
            done <<< "$changed"
            exit 1
          fi

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  cargo-version-sync:
    name: Cargo Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/check-cargo-version-sync.sh

  updater-manifest:
    name: Updater Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: scripts/test-build-updater-manifest.sh

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p claudette -p claudette-server -p claudette-cli --all-targets --all-features

  desktop-tauri-check:
    name: Desktop Tauri Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache Pi harness Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: pi-harness-bun-${{ runner.os }}-${{ hashFiles('src-pi-harness/bun.lock') }}
          restore-keys: |
            pi-harness-bun-${{ runner.os }}-
      - name: Stage Tauri sidecars
        run: scripts/stage-cli-sidecar.sh --profile debug
      # `cargo test --no-run` (not `cargo check`) so the binary crate's
      # test targets are compiled too — CI's `test` job only covers
      # claudette / -server / -cli, so a non-compiling test fixture in
      # claudette-tauri would otherwise slip through entirely.
      - name: Compile claudette-tauri (incl. test targets)
        run: cargo test -p claudette-tauri --no-default-features --features devtools,server,voice,alternative-backends,pi-sdk --no-run

  mobile:
    name: Mobile (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (claudette-mobile, desktop-fallback target)
        run: cargo clippy -p claudette-mobile --target aarch64-apple-darwin --all-targets --locked
      - name: Test (claudette-mobile)
        run: cargo test -p claudette-mobile --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with coverage
        run: cargo llvm-cov -p claudette -p claudette-server -p claudette-cli --all-features --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: utensils/claudette
          files: lcov.info
          fail_ci_if_error: false
      # Claude Interactive patch-coverage gate (blocking — Task G1).
      # See scripts/check-coverage-interactive.sh and CLAUDE.md. Files
      # excluded from the gate (e.g. tmux.rs, sidecar.rs) are documented
      # inline in the check script with their structural rationale.
      - name: Run llvm-cov (interactive patch JSON)
        run: ./scripts/coverage-interactive.sh
      - name: Check interactive patch coverage
        env:
          COVERAGE_GATE_BLOCKING: "1"
        run: ./scripts/check-coverage-interactive.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run lint:css
      - run: bun run build
      - run: bun run test
      # Claude Interactive patch-coverage gate for the frontend (blocking —
      # Task G1). Per-file thresholds live in `vitest.config.ts` and vitest
      # exits non-zero if any of them regresses.
      - run: bun run test:coverage:interactive

  frontend-smoke:
    name: Frontend Bundle Smoke
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bunx playwright install --with-deps chromium
      - run: bun run smoke:bundle

  # Note: Windows is not built in this CI pipeline. Windows artifacts
  # are produced by the nightly (`.github/workflows/nightly.yml`) and
  # release (`.github/workflows/release-please.yml`) workflows, which
  # cover both `x86_64-pc-windows-msvc` and `aarch64-pc-windows-msvc`.
  # Skipping Windows here keeps PR turnaround fast — Windows runners
  # take ~10 min — without losing build-verification coverage where
  # it matters (artifact production).
