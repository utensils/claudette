name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p claudette -p claudette-server --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with coverage
        run: cargo llvm-cov -p claudette -p claudette-server --all-features --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: utensils/claudette
          files: lcov.info
          fail_ci_if_error: false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run lint:css
      - run: bun run build
      - run: bun run test

  # Native Linux aarch64 build smoke test. The other Linux jobs (clippy,
  # test) run on `ubuntu-latest` (x86_64), so this catches arch-specific
  # regressions in the release build path before they reach a tag. Runs
  # on the GA `ubuntu-22.04-arm` first-party runner — native, no QEMU /
  # cross toolchain.
  linux-aarch64-check:
    name: Linux aarch64 Check
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-aarch64

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install frontend dependencies
        run: cd src/ui && bun install --frozen-lockfile

      # `tauri::generate_context!()` checks that `frontendDist` exists at
      # compile time, and the release build actually embeds the files,
      # so we need a built frontend before any `cargo` command that
      # touches claudette-tauri.
      - name: Build frontend
        run: cd src/ui && bun run build

      - name: Generate icons
        run: npx @tauri-apps/cli icon assets/logo.png

      - name: cargo check (full workspace)
        run: cargo check --workspace --target aarch64-unknown-linux-gnu

      # Release-mode build of just the Tauri bin, so the asset-embedding
      # path (tauri_build + custom-protocol) is exercised on aarch64.
      - name: cargo build --release (claudette-tauri)
        run: cargo build --release -p claudette-tauri --features tauri/custom-protocol --target aarch64-unknown-linux-gnu

      - name: cargo test (library crates)
        run: cargo test -p claudette -p claudette-server --target aarch64-unknown-linux-gnu

  # Native Windows build check on both supported targets. We compile the
  # full workspace (including the Tauri bin, which pulls in WebView2 +
  # Win32 APIs) and run the library tests so Windows-specific code paths
  # — process/PTY spawning, verbatim-path handling, registry PATH reads —
  # are exercised on a real Windows host. The matrix runs on first-party
  # GitHub runners; `windows-11-arm` is GA and ships a native ARM64
  # MSVC toolchain so this is a native build, not cross-compilation.
  windows-check:
    name: Windows Check (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            label: x86_64
          - platform: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            label: aarch64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.label }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install frontend dependencies
        shell: bash
        run: cd src/ui && bun install --frozen-lockfile

      # `tauri::generate_context!()` checks that `frontendDist` exists at
      # compile time, and the release build actually embeds the files,
      # so we need a built frontend before any `cargo` command that
      # touches claudette-tauri.
      - name: Build frontend
        shell: bash
        run: cd src/ui && bun run build

      - name: Generate icons
        shell: bash
        run: npx @tauri-apps/cli icon assets/logo.png

      - name: cargo check (full workspace)
        shell: bash
        run: cargo check --workspace --target ${{ matrix.rust-target }}

      # Release-mode build of just the Tauri bin, so the asset-embedding
      # path (tauri_build + custom-protocol) is exercised on Windows.
      # Without this the check job can miss regressions that only fire
      # under the release profile or the embedded-frontend codegen.
      - name: cargo build --release (claudette-tauri)
        shell: bash
        run: cargo build --release -p claudette-tauri --features tauri/custom-protocol --target ${{ matrix.rust-target }}

      - name: cargo test (library crates)
        shell: bash
        run: cargo test -p claudette -p claudette-server --target ${{ matrix.rust-target }}
