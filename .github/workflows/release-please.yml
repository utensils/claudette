name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish (e.g. v0.9.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

      # Immediately mark the release as draft so it's not visible until
      # all build artifacts have been uploaded successfully.
      - name: Mark release as draft
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.release.outputs.tag_name }}" --draft --repo "${{ github.repository }}"

  # Resolve the tag into a single output that downstream jobs can reference.
  # Uses `always()` so it runs even when release-please is skipped (dispatch).
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    needs: release-please
    if: >-
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.releases_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-tag
    if: always() && needs.resolve-tag.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: app,dmg
            label: macos-aarch64
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            bundles: app,dmg
            label: macos-x86_64
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-x86_64
          # GitHub-hosted aarch64 Linux runner (`ubuntu-22.04-arm`) is GA and
          # native, so this is a real ARM64 build — no QEMU / cross toolchain.
          - platform: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-aarch64
          # Windows keeps the user-facing zip asset and also publishes a
          # signed NSIS updater asset so `latest.json` can advertise an
          # in-app update target for Windows.
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: ""
            label: windows-x86_64
          - platform: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            bundles: ""
            label: windows-aarch64

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install frontend dependencies
        shell: bash
        run: cd src/ui && bun install --frozen-lockfile

      - name: Generate icons
        shell: bash
        run: npx @tauri-apps/cli icon assets/logo.png

      # Build the `claudette` CLI for the current matrix target and stage
      # it where `bundle.externalBin` expects (`src-tauri/binaries/
      # claudette-<TARGET_TRIPLE>`). Tauri's bundler copies it next to
      # the GUI binary in every artifact (.app, .deb, AppImage, Windows
      # zip), so the GUI's "Install on PATH" action can symlink to a
      # known on-disk location without downloading anything.
      - name: Build and stage CLI sidecar
        shell: bash
        run: scripts/stage-cli-sidecar.sh ${{ matrix.rust-target }}

      # ---- macOS + Linux: tauri-action drives the bundled build ------------
      # macOS bundles get up to 3 attempts to absorb transient
      # Apple-notarization flakes (NSURLErrorDomain -1009 polling
      # appstoreconnect.apple.com — see nightly.yml for the full
      # rationale and the run that motivated this). Linux runs once.
      - name: Build and upload desktop app (non-Windows) — attempt 1
        id: bundle1
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        continue-on-error: ${{ runner.os == 'macOS' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: ${{ needs.resolve-tag.outputs.tag }}
          releaseDraft: true
          includeUpdaterJson: false
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      - name: Build and upload desktop app (non-Windows) — attempt 2 (macOS retry)
        id: bundle2
        if: ${{ runner.os == 'macOS' && steps.bundle1.outcome == 'failure' }}
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: ${{ needs.resolve-tag.outputs.tag }}
          releaseDraft: true
          includeUpdaterJson: false
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      - name: Build and upload desktop app (non-Windows) — attempt 3 (macOS final)
        if: ${{ runner.os == 'macOS' && steps.bundle1.outcome == 'failure' && steps.bundle2.outcome == 'failure' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: ${{ needs.resolve-tag.outputs.tag }}
          releaseDraft: true
          includeUpdaterJson: false
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      # ---- Windows: direct Tauri build, ship zip + NSIS updater ------------
      # `custom-protocol` is the feature flag that tells tauri-build to
      # embed `frontendDist` (otherwise the release binary tries to
      # contact the devUrl at startup and shows "localhost refused to
      # connect"). `alternative-backends` is kept in release binaries
      # and the user-facing runtime gate defaults on.
      - name: Install Tauri CLI (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop exe and updater installer (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build \
            --target ${{ matrix.rust-target }} \
            --bundles nsis \
            --features tauri/custom-protocol,alternative-backends

      # Zip the bare .exe before upload. Raw unsigned .exe downloads
      # trigger aggressive SmartScreen + browser warnings ("file not
      # commonly downloaded / could harm your device"); shipping inside
      # a .zip is the customary Windows distribution shape and keeps
      # Mark-of-the-Web attached to the archive rather than the binary.
      # `Compress-Archive` is a built-in PowerShell cmdlet on every
      # Windows runner — no external deps.
      - name: Upload desktop exe (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-app.exe"
          # Bundle the CLI sidecar alongside the GUI exe so the
          # Settings → CLI "Install on PATH" action can find it via
          # `current_exe().parent()/"claudette.exe"`. The Windows path
          # skips tauri-action so externalBin doesn't auto-stage here.
          CLI="src-tauri/binaries/claudette-${{ matrix.rust-target }}.exe"
          ASSET="claudette-${{ matrix.label }}.zip"
          cp "$BIN" claudette-app.exe
          cp "$CLI" claudette.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette-app.exe','claudette.exe' -DestinationPath '$ASSET' -Force"
          gh release upload "${{ needs.resolve-tag.outputs.tag }}" "$ASSET" --clobber

      - name: Upload updater installer (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          NSIS_DIR="target/${{ matrix.rust-target }}/release/bundle/nsis"
          INSTALLER="$(find "$NSIS_DIR" -maxdepth 1 -name '*setup.exe' -print -quit)"
          if [ -z "$INSTALLER" ]; then
            echo "::error::No NSIS updater installer found in $NSIS_DIR"
            exit 1
          fi
          SIG="${INSTALLER}.sig"
          if [ ! -f "$SIG" ]; then
            cargo tauri signer sign \
              -k "$TAURI_SIGNING_PRIVATE_KEY" \
              -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "$INSTALLER" > "$SIG"
          fi
          gh release upload "${{ needs.resolve-tag.outputs.tag }}" "$INSTALLER" "$SIG" --clobber

      - name: Build headless server
        shell: bash
        run: cargo build --release -p claudette-server --target ${{ matrix.rust-target }}

      - name: Upload headless server binary (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server"
          ASSET="claudette-server-${{ matrix.label }}"
          cp "$BIN" "$ASSET"
          gh release upload "${{ needs.resolve-tag.outputs.tag }}" "$ASSET" --clobber

      - name: Upload headless server binary (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server.exe"
          ASSET="claudette-server-${{ matrix.label }}.zip"
          cp "$BIN" claudette-server.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette-server.exe' -DestinationPath '$ASSET' -Force"
          gh release upload "${{ needs.resolve-tag.outputs.tag }}" "$ASSET" --clobber

      # Standalone CLI asset for users who only want the CLI (CI bots,
      # headless servers). The same binary already ships inside the app
      # artifacts above; this is just an extra distribution channel.
      - name: Upload standalone CLI (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette"
          ASSET="claudette-cli-${{ matrix.label }}"
          cp "$BIN" "$ASSET"
          gh release upload "${{ needs.resolve-tag.outputs.tag }}" "$ASSET" --clobber

      - name: Upload standalone CLI (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette.exe"
          ASSET="claudette-cli-${{ matrix.label }}.zip"
          cp "$BIN" claudette.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette.exe' -DestinationPath '$ASSET' -Force"
          gh release upload "${{ needs.resolve-tag.outputs.tag }}" "$ASSET" --clobber

  publish:
    name: Publish Release
    needs: [resolve-tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail

          mkdir -p release-sigs
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.sig" \
            --dir release-sigs \
            --clobber

          VERSION="${TAG#v}"
          scripts/build-updater-manifest.sh \
            release-sigs \
            "$VERSION" \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}" \
            > latest.json

          gh release upload "$TAG" latest.json --clobber --repo "$GITHUB_REPOSITORY"

      - name: Un-draft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.resolve-tag.outputs.tag }}" --draft=false --repo "${{ github.repository }}"

  notify-discord:
    name: Discord Release Notification
    needs: [resolve-tag, publish]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract changelog and notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG_NAME: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set — skipping notification"
            exit 0
          fi

          # Extract text between first and second ## [ headers
          CHANGELOG=$(sed -n '/^## \[/{n; :loop; /^## \[/q; p; n; b loop}' CHANGELOG.md)

          # Strip commit hash links — clutter in Discord
          CHANGELOG=$(echo "$CHANGELOG" | sed 's/ (\[[a-f0-9]\{7,\}\](https:\/\/[^)]*))//g')

          # Trim leading blank lines
          CHANGELOG=$(echo "$CHANGELOG" | sed '/./,$!d')

          # Truncate to 1900 chars (leaving room for embed overhead)
          if [ ${#CHANGELOG} -gt 1900 ]; then
            CHANGELOG="${CHANGELOG:0:1897}..."
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"

          PAYLOAD=$(jq -n \
            --arg title "Claudette ${TAG_NAME} Released" \
            --arg url "$RELEASE_URL" \
            --arg desc "$CHANGELOG" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5763719
              }]
            }')

          curl -f -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
