name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish (e.g. v0.9.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

      # Immediately mark the release as draft so it's not visible until
      # all build artifacts have been uploaded successfully.
      - name: Mark release as draft
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.release.outputs.tag_name }}" --draft --repo "${{ github.repository }}"

  # Resolve the tag into a single output that downstream jobs can reference.
  # Uses `always()` so it runs even when release-please is skipped (dispatch).
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    needs: release-please
    if: >-
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.releases_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

  prepare-staging:
    name: Prepare Staging Release
    runs-on: ubuntu-latest
    needs: resolve-tag
    if: always() && needs.resolve-tag.result == 'success'
    outputs:
      staging_tag: ${{ steps.staging.outputs.tag }}
      staging_release_id: ${{ steps.staging.outputs.release_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail

          TARGET_SHA=$(git rev-list -n 1 "$TAG")
          STAGING_TAG="${TAG}-staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          gh release delete "$STAGING_TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$TAG" \
              --notes "" \
              --draft
          fi

          RELEASE_ID=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$STAGING_TAG" \
            -f target_commitish="$TARGET_SHA" \
            -f name="${TAG} staging" \
            -f body="Temporary staging release for ${TAG}." \
            -F draft=true \
            -F prerelease=false \
            --jq .id)
          echo "tag=${STAGING_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  build:
    needs: [resolve-tag, prepare-staging]
    if: always() && needs.prepare-staging.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: app
            label: macos-aarch64
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            bundles: app
            label: macos-x86_64
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-x86_64
          # GitHub-hosted aarch64 Linux runner (`ubuntu-22.04-arm`) is GA and
          # native, so this is a real ARM64 build — no QEMU / cross toolchain.
          - platform: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
            label: linux-aarch64
          # Windows ships bare `.exe` assets only (no MSI/NSIS bundle).
          # The tauri-action step is skipped on Windows and we drive
          # cargo directly against the native MSVC toolchain baked into
          # GitHub's Windows runners. `windows-11-arm` is GA and native,
          # so ARM64 builds aren't cross-compiled.
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: ""
            label: windows-x86_64
          - platform: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            bundles: ""
            label: windows-aarch64

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install frontend dependencies
        shell: bash
        run: cd src/ui && bun install --frozen-lockfile

      - name: Generate icons
        shell: bash
        run: npx @tauri-apps/cli icon assets/logo.png

      # ---- macOS + Linux: tauri-action drives the bundled build ------------
      - name: Build and upload desktop app (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ needs.prepare-staging.outputs.staging_tag }}
          releaseId: ${{ needs.prepare-staging.outputs.staging_release_id }}
          releaseName: ${{ needs.resolve-tag.outputs.tag }}
          releaseDraft: true
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      # DMGs are useful manual downloads, but they are not part of the
      # updater contract. Build and upload them after the app tarball/manifest
      # so a DMG packaging failure cannot strand the update feed again.
      - name: Build and upload macOS DMG (best effort)
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          STAGING_TAG: ${{ needs.prepare-staging.outputs.staging_tag }}
        run: |
          set -euo pipefail
          npx @tauri-apps/cli@v2 build --target ${{ matrix.rust-target }} --bundles dmg

          shopt -s nullglob
          dmgs=(target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "::warning::No DMG was produced for ${{ matrix.label }}"
            exit 0
          fi

          gh release upload "$STAGING_TAG" "${dmgs[@]}" --repo "$GITHUB_REPOSITORY" --clobber

      # ---- Windows: direct cargo build, ship the bare .exe -----------------
      # `custom-protocol` is the feature flag that tells tauri-build to
      # embed `frontendDist` (otherwise the release binary tries to
      # contact the devUrl at startup and shows "localhost refused to
      # connect"). `tauri-action` sets this automatically via
      # `cargo tauri build`; since we're bypassing it on Windows, we
      # pass the flag explicitly.
      - name: Build desktop exe (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: |
          cd src/ui && bun run build && cd ../..
          cargo build --release -p claudette-tauri \
            --features tauri/custom-protocol \
            --target ${{ matrix.rust-target }}

      # Zip the bare .exe before upload. Raw unsigned .exe downloads
      # trigger aggressive SmartScreen + browser warnings ("file not
      # commonly downloaded / could harm your device"); shipping inside
      # a .zip is the customary Windows distribution shape and keeps
      # Mark-of-the-Web attached to the archive rather than the binary.
      # `Compress-Archive` is a built-in PowerShell cmdlet on every
      # Windows runner — no external deps.
      - name: Upload desktop exe (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette.exe"
          ASSET="claudette-${{ matrix.label }}.zip"
          cp "$BIN" claudette.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette.exe' -DestinationPath '$ASSET' -Force"
          gh release upload "${{ needs.prepare-staging.outputs.staging_tag }}" "$ASSET" --clobber

      - name: Build headless server
        shell: bash
        run: cargo build --release -p claudette-server --target ${{ matrix.rust-target }}

      - name: Upload headless server binary (non-Windows)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server"
          ASSET="claudette-server-${{ matrix.label }}"
          cp "$BIN" "$ASSET"
          gh release upload "${{ needs.prepare-staging.outputs.staging_tag }}" "$ASSET" --clobber

      - name: Upload headless server binary (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="target/${{ matrix.rust-target }}/release/claudette-server.exe"
          ASSET="claudette-server-${{ matrix.label }}.zip"
          cp "$BIN" claudette-server.exe
          powershell -NoProfile -Command "Compress-Archive -Path 'claudette-server.exe' -DestinationPath '$ASSET' -Force"
          gh release upload "${{ needs.prepare-staging.outputs.staging_tag }}" "$ASSET" --clobber

  publish:
    name: Publish Release
    needs: [resolve-tag, prepare-staging, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Promote staging assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
          STAGING_TAG: ${{ needs.prepare-staging.outputs.staging_tag }}
        run: |
          set -euo pipefail
          .github/scripts/promote-release-assets.sh "$GITHUB_REPOSITORY" "$STAGING_TAG" "$TAG"

      - name: Un-draft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.resolve-tag.outputs.tag }}" --draft=false --repo "${{ github.repository }}"

      - name: Validate public updater manifest
        run: .github/scripts/validate-public-latest.sh "${{ github.repository }}" "${{ needs.resolve-tag.outputs.tag }}"

      - name: Delete staging release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ needs.prepare-staging.outputs.staging_tag }}" --yes --repo "${{ github.repository }}" 2>/dev/null || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${{ needs.prepare-staging.outputs.staging_tag }}" 2>/dev/null || true

  notify-discord:
    name: Discord Release Notification
    needs: [resolve-tag, publish]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract changelog and notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG_NAME: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set — skipping notification"
            exit 0
          fi

          # Extract text between first and second ## [ headers
          CHANGELOG=$(sed -n '/^## \[/{n; :loop; /^## \[/q; p; n; b loop}' CHANGELOG.md)

          # Strip commit hash links — clutter in Discord
          CHANGELOG=$(echo "$CHANGELOG" | sed 's/ (\[[a-f0-9]\{7,\}\](https:\/\/[^)]*))//g')

          # Trim leading blank lines
          CHANGELOG=$(echo "$CHANGELOG" | sed '/./,$!d')

          # Truncate to 1900 chars (leaving room for embed overhead)
          if [ ${#CHANGELOG} -gt 1900 ]; then
            CHANGELOG="${CHANGELOG:0:1897}..."
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"

          PAYLOAD=$(jq -n \
            --arg title "Claudette ${TAG_NAME} Released" \
            --arg url "$RELEASE_URL" \
            --arg desc "$CHANGELOG" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5763719
              }]
            }')

          curl -f -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
