name: Nix

# Keep the Nix flake buildable by auto-updating the frontend
# fixed-output derivation (FOD) hashes whenever src/ui/ changes on
# main.
#
# Only the frontend needs this — the Rust crates (claudette,
# claudette-server) use crane, which takes source as a regular input
# with no hardcoded output hash.
#
# The path filter also prevents an infinite loop — the squash-merged
# PR only touches flake.nix, not src/ui/.
#
# NOTE: if `nix flake update` bumps the bun package version, the
# hashes will also drift.  Add 'flake.lock' to the paths list below
# if you want this workflow to cover that case too.

on:
  push:
    branches: [main]
    paths:
      - 'src/ui/**'
  workflow_dispatch:

concurrency:
  group: update-frontend-hash
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  hash-linux:
    name: Compute hash (Linux)
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Compute FOD hash
        id: hash
        run: |
          # We must build inside the Nix sandbox to get the correct hash.
          # rolldown (Vite 8's bundler) produces non-deterministic output
          # across sandboxed vs non-sandboxed builds, so computing the
          # hash outside Nix (bun run build && nix hash path) won't match.
          #
          # Replace hashes with a dummy so nix build fails and reports
          # the real hash via "got:".  If the build somehow succeeds
          # (dummy happens to match — essentially impossible), treat
          # the existing hash as correct.
          perl -i -pe 's/"sha256-[A-Za-z0-9+\/]+=+"/"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="/g' flake.nix
          OUTPUT=$(nix build .#frontend -L 2>&1) && { echo "hash=" >> "$GITHUB_OUTPUT"; exit 0; } || true
          HASH=$(echo "$OUTPUT" | grep 'got:' | awk '{print $2}')
          if [ -z "$HASH" ]; then
            echo "::error::Failed to extract FOD hash from nix build output"
            echo "$OUTPUT"
            exit 1
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

  hash-darwin:
    name: Compute hash (macOS)
    runs-on: macos-latest
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Compute FOD hash
        id: hash
        run: |
          perl -i -pe 's/"sha256-[A-Za-z0-9+\/]+=+"/"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="/g' flake.nix
          OUTPUT=$(nix build .#frontend -L 2>&1) && { echo "hash=" >> "$GITHUB_OUTPUT"; exit 0; } || true
          HASH=$(echo "$OUTPUT" | grep 'got:' | awk '{print $2}')
          if [ -z "$HASH" ]; then
            echo "::error::Failed to extract FOD hash from nix build output"
            echo "$OUTPUT"
            exit 1
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

  update:
    name: Update flake.nix
    needs: [hash-linux, hash-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update hashes
        id: update
        env:
          NEW_DARWIN: ${{ needs.hash-darwin.outputs.hash }}
          NEW_LINUX: ${{ needs.hash-linux.outputs.hash }}
        run: |
          # Extract current hashes from the outputHash block.
          # Darwin hash is the line after "isDarwin then"; Linux is 3 lines after.
          CURRENT_DARWIN=$(sed -n '/isDarwin then/{n;s/.*"\(sha256-[^"]*\)".*/\1/p;}' flake.nix)
          CURRENT_LINUX=$(sed -n '/isDarwin then/{n;n;n;s/.*"\(sha256-[^"]*\)".*/\1/p;}' flake.nix)

          echo "Current darwin: $CURRENT_DARWIN"
          echo "Current linux:  $CURRENT_LINUX"
          echo "New darwin:     $NEW_DARWIN"
          echo "New linux:      $NEW_LINUX"

          if [ -z "$CURRENT_DARWIN" ] || [ -z "$CURRENT_LINUX" ]; then
            echo "::error::Failed to extract current hashes from flake.nix"
            exit 1
          fi

          # Empty NEW_* means the build succeeded with the dummy hash
          # (i.e., existing hash is already correct for that platform)
          [ -z "$NEW_DARWIN" ] && NEW_DARWIN="$CURRENT_DARWIN"
          [ -z "$NEW_LINUX" ] && NEW_LINUX="$CURRENT_LINUX"

          if [ "$CURRENT_DARWIN" = "$NEW_DARWIN" ] && [ "$CURRENT_LINUX" = "$NEW_LINUX" ]; then
            echo "Hashes already up to date"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Replace hashes — \Q..\E quotes metacharacters in the hash (+ and /)
          perl -i -pe "s|\Q$CURRENT_DARWIN\E|$NEW_DARWIN|" flake.nix
          perl -i -pe "s|\Q$CURRENT_LINUX\E|$NEW_LINUX|" flake.nix
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-frontend-fod-hashes"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Close any stale hash-update PR from a previous run
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --delete-branch || true
          fi

          git checkout -b "$BRANCH"
          git add flake.nix
          git commit -m "chore(nix): update frontend FOD hashes"
          git push --force-with-lease origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore(nix): update frontend FOD hashes" \
            --body "$(cat <<'EOF'
          Automated update of the Nix frontend fixed-output derivation hashes.

          Triggered by changes to `src/ui/` on `main`. Auto-merges once required status checks pass.
          EOF
          )" \
            --head "$BRANCH" \
            --base main)

          gh pr merge "$PR_URL" --auto --squash
