[package]
name = "claudette"
version = "0.1.0"
edition = "2024"
description = "Claude's missing better half — a companion tool for Claude Code"

[dependencies]
futures = "0.3"
iced = { version = "0.14", features = ["tokio", "markdown", "highlighter", "svg", "canvas", "advanced"] }
iced_term = "0.7"
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["process", "fs", "io-util", "time", "sync"] }
uuid = { version = "1", features = ["v4"] }
dirs = "6"
open = "5"
rand = "0.8"
rfd = "0.17.2"
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3", default-features = false, features = ["NSApplication", "NSImage"] }
objc2-foundation = { version = "0.3", default-features = false, features = ["NSData"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# libghostty integration (terminal emulation) — not yet stable, requires zig toolchain
# ghostty = "0.1"
