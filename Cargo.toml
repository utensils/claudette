[workspace]
members = ["src-tauri", "src-server"]
resolver = "2"

[package]
name = "claudette"
version = "0.8.0"
edition = "2024"
description = "Claude's missing better half — a companion tool for Claude Code"
license = "MIT"

[lib]
path = "src/lib.rs"

[dependencies]
base64 = "0.22"
futures = "0.3"
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["process", "fs", "io-util", "time", "sync", "rt"] }
uuid = { version = "1", features = ["v4"] }
dirs = "6"
open = "5"
rand = "0.8"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
